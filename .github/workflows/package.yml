name: Package Extension

on:
  push:
    branches:
      - main
      - master
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
      - master

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Zip extension files
        run: |
          # Package all necessary files into a single zip file for uploading to the Chrome Web Store
          zip -r extension.zip . -x "*.git*" "*.github*" "*.DS_Store" "node_modules/*" "*.md"

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: smart-video-speed-controller
          path: extension.zip
          retention-days: 7

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v1
        with:
          files: extension.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
